<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">CodexStock sub-engine orchestration demo</title>
  <desc id="desc">Synthetic public demo showing sub-engine orchestration without private data.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071217"/>
      <stop offset="1" stop-color="#182b20"/>
    </linearGradient>
    <style>
      .bg{fill:url(#bg)}
      .host{fill:#102a32;stroke:#52dcff;stroke-width:3}
      .engine{fill:#101b22;stroke:#2b7789;stroke-width:1.5}
      .safe{fill:#09241c;stroke:#4de0a4;stroke-width:1.5}
      .text{font-family:Segoe UI,Arial,sans-serif;fill:#effcff}
      .muted{fill:#90aab0}
      .cyan{fill:#52dcff}
      .green{fill:#4de0a4}
      .yellow{fill:#f2cc60}
      .arrow{stroke:#52dcff;stroke-width:2.5;fill:none;marker-end:url(#m)}
    </style>
    <marker id="m" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#52dcff"/>
    </marker>
  </defs>
  <rect class="bg" width="1280" height="720"/>
  <text x="56" y="70" class="text cyan" font-size="32" font-weight="800">Sub-Engine Orchestration</text>
  <text x="56" y="104" class="text muted" font-size="17">Specialist engines provide evidence. CodexStock remains the host and final policy layer.</text>

  <rect x="430" y="260" width="420" height="172" rx="28" class="host"/>
  <text x="520" y="322" class="text" font-size="34" font-weight="800">CodexStock</text>
  <text x="502" y="360" class="text muted" font-size="17">reviews evidence · applies risk gates · records decisions</text>
  <text x="544" y="396" class="text green" font-size="16" font-weight="700">No unrestricted live-order authority leaves the host</text>

  <g class="text" font-size="15">
    <rect x="70" y="166" width="250" height="84" rx="18" class="engine"/>
    <text x="96" y="202" font-weight="700">Research Forge</text>
    <text x="96" y="226" class="muted">walk-forward · reports · readiness</text>
    <path d="M320 208 C360 230 390 260 430 306" class="arrow"/>

    <rect x="70" y="316" width="250" height="84" rx="18" class="engine"/>
    <text x="96" y="352" font-weight="700">External Signal Scout</text>
    <text x="96" y="376" class="muted">news · blogs · themes · alerts</text>
    <path d="M320 358 C366 354 392 348 430 346" class="arrow"/>

    <rect x="70" y="466" width="250" height="84" rx="18" class="engine"/>
    <text x="96" y="502" font-weight="700">KIS Official Gateway</text>
    <text x="96" y="526" class="muted">read-only checks · reconciliation</text>
    <path d="M320 508 C370 474 396 430 430 390" class="arrow"/>

    <rect x="960" y="126" width="250" height="76" rx="18" class="engine"/>
    <text x="986" y="160" font-weight="700">vectorbt</text>
    <text x="986" y="184" class="muted">fast vectorized experiments</text>
    <path d="M960 164 C910 190 870 242 820 284" class="arrow"/>

    <rect x="960" y="230" width="250" height="76" rx="18" class="engine"/>
    <text x="986" y="264" font-weight="700">Qlib / OpenBB</text>
    <text x="986" y="288" class="muted">factor and market research</text>
    <path d="M960 268 C910 286 878 308 850 326" class="arrow"/>

    <rect x="960" y="334" width="250" height="76" rx="18" class="engine"/>
    <text x="986" y="368" font-weight="700">Lean / Nautilus</text>
    <text x="986" y="392" class="muted">independent backtest assumptions</text>
    <path d="M960 372 C914 368 884 360 850 350" class="arrow"/>

    <rect x="960" y="438" width="250" height="76" rx="18" class="engine"/>
    <text x="986" y="472" font-weight="700">Backtrader / FinRL</text>
    <text x="986" y="496" class="muted">optional specialist experiments</text>
    <path d="M960 476 C910 440 878 406 850 384" class="arrow"/>
  </g>

  <rect x="388" y="574" width="504" height="74" rx="20" class="safe"/>
  <text x="430" y="606" class="text green" font-size="18" font-weight="800">Safety contract</text>
  <text x="430" y="632" class="text muted" font-size="15">Sub-engines propose or verify. CodexStock decides, gates, and logs.</text>
</svg>
